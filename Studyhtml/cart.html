<html>
<head>

<body>

        <th></th>
        <th>Item</th>
        <th>Amount</th>
        <th>Price</th>
        <th>Total</th>

    </thead>
    <tbody>
      <tr>
        <td><img src="img/item1.png" width="50px"></td>
        <td>카메라</td>

        <td>7000</td>
        <td>7000</td>
      </tr>
      <tr>
        <td colspan="5" style="text-align: right">총가격 : 7000</td>
      
      </tr>
    </tbody>
  </table>  
    
  <button class="main-btn bg-red f-lg">더알아보기</button>

  <a href="#" class="custom-link">링크</a>

    <p class="profile-content"></p>

</div>
